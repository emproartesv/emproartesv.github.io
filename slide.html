<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {box-sizing: border-box;}
body {font-family: Verdana, sans-serif;}
.mySlides {display: none;}
img {vertical-align: middle;}

/* Slideshow container */
.slideshow-container {
  max-width: 1000px;
  position: relative;
  margin: auto;
}

/* Caption text */
.text {
  color: #f2f2f2;
  font-size: 15px;
  padding: 8px 12px;
  position: absolute;
  bottom: 8px;
  width: 100%;
  text-align: center;
}

/* Number text (1/3 etc) */
.numbertext {
  color: #f2f2f2;
  font-size: 12px;
  padding: 8px 12px;
  position: absolute;
  top: 0;
}

/* The dots/bullets/indicators */
.dot {
  height: 15px;
  width: 15px;
  margin: 0 2px;
  background-color: #bbb;
  border-radius: 50%;
  display: inline-block;
  transition: background-color 0.6s ease;
}

.active {
  background-color: #717171;
}

/* Fading animation */
.fade {
  -webkit-animation-name: fade;
  -webkit-animation-duration: 1.5s;
  animation-name: fade;
  animation-duration: 1.5s;
}

@-webkit-keyframes fade {
  from {opacity: .4} 
  to {opacity: 1}
}

@keyframes fade {
  from {opacity: .4} 
  to {opacity: 1}
}

/* On smaller screens, decrease text size */
@media only screen and (max-width: 300px) {
  .text {font-size: 11px}
}
</style>
</head>
<body>

<h2></h2>
<p></p>

<div class="slideshow-container">

<div class="mySlides fade">
  <div class="numbertext"></div>
  <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgNVDxovsHaeJCM-5lAnnq-G-0I3xRz6M50v6xTOpzqru_3erHzsc-RvqX1A0MdOhpxiFXpOFj3RI92evEs0af99H9M4nBWTj8_GbC4BREuCKzIeLPmw_Aqr5awQKIdxJAjRpwrXezo88o3NATNHitxFHQLWmkw0Zeomy6bHjVgGk5W0fG_4r9mTFGlhAFg/s320/a26_01.png" style="width:100%">
  <div class="text"></div>
</div>

<div class="mySlides fade">
  <div class="numbertext"></div>
  <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh3dIgi2IsnBixnFOLyhYMbFWiCsGudQHiRMtyCM1FueNCnMlUDLatiQsTaGEMUUadNm1w4f-1B5nz8iSiUyxbxf6Zr7lhTC69fS6xzxJlBYfvcB_0Tmo0vtfMs_gj3tVHLz87n1b94P0lrxf5tL5pm-m7zUOn30dMqGvciFUBJ-vVQhlwWDcjmRuLKJuGR/s1102/a26_02.png" style="width:100%">
  <div class="text"></div>
</div>

<div class="mySlides fade">
  <div class="numbertext"></div>
  <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhhS0DwEkOGUqJj3snM3OnLPNhYrxSE0WPAvK7iw6KdDWvWG_ML5Pzfxn3-YcQv9kKSv0yjXQVV1qE1kov5C0XIeFRlTea-uC-JIZiR8Ejmby9vg9hujtYUFOWZp7jRPygr28x-LcUdf9bcXUzfzAdUsF4edYrp1DKUCbtmeAe4S2-y214nzji3J0iD2JST/s1102/a26_03.png" style="width:100%">
  <div class="text"></div>
</div>

</div>
<br>

<div style="text-align:center">
  <span class="dot"></span> 
  <span class="dot"></span> 
  <span class="dot"></span> 
</div>

<script>
var slideIndex = 0;
showSlides();

function showSlides() {
  var i;
  var slides = document.getElementsByClassName("mySlides");
  var dots = document.getElementsByClassName("dot");
  for (i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";  
  }
  slideIndex++;
  if (slideIndex > slides.length) {slideIndex = 1}    
  for (i = 0; i < dots.length; i++) {
    dots[i].className = dots[i].className.replace(" active", "");
  }
  slides[slideIndex-1].style.display = "block";  
  dots[slideIndex-1].className += " active";
  setTimeout(showSlides, 5000); // Change image every 2 seconds
}
</script>

</body>
</html>
