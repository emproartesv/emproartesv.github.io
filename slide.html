<style>
  .slider-container {
    width: 100%;
    max-width: 800px;
    margin: auto;
    overflow: hidden;
    border-radius: 10px;
  }
  .slider {
    display: flex;
    width: 300%;
    animation: slide 12s infinite;
  }
  .slider img {
    width: 100%;
    height: 400px;
    object-fit: cover;
  }
  @keyframes slide {
    0% { transform: translateX(0); }
    33% { transform: translateX(-100%); }
    66% { transform: translateX(-200%); }
    100% { transform: translateX(0); }
  }
</style>
