<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Eduar Shop Pro</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY"></script>
    <style>
        :root {
            --fondo: #000000;
            --primario: #ccff00; 
            --secundario: #bf00ff; 
            --acento: #ff5f00; 
            --texto: #ffffff;
            --tarjeta: #111111;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { background: var(--fondo); color: var(--texto); margin: 0; padding-bottom: 90px; }

        /* Pantalla de Inicio / Instalación */
        #selector-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--fondo); z-index: 9999; display: flex;
            flex-direction: column; align-items: center; justify-content: center; padding: 25px;
        }
        .logo-ntv {
            background: var(--primario); color: #000; font-weight: 900;
            font-size: 3.5rem; padding: 10px 25px; border-radius: 12px;
            margin-bottom: 25px; box-shadow: 0 0 30px rgba(204, 255, 0, 0.4);
        }

        /* Botones */
        .btn { width: 100%; padding: 18px; border-radius: 14px; border: none; font-weight: 800; font-size: 1rem; text-transform: uppercase; margin: 10px 0; }
        .btn-pwa { background: var(--secundario); color: #fff; }
        .btn-web { background: transparent; border: 2px solid var(--primario); color: var(--primario); }
        .btn-action { background: var(--primario); color: #000; }
        .btn-gps { background: transparent; border: 1px solid var(--acento); color: var(--acento); padding: 10px; font-size: 0.8rem; }

        /* Estructura */
        .header { padding: 15px 20px; background: rgba(0,0,0,0.9); border-bottom: 1px solid #222; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .input-box { width: 100%; padding: 16px; background: var(--tarjeta); border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 15px; }
        .vista { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .activa { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Navegación */
        .nav-inferior { position: fixed; bottom: 0; width: 100%; height: 80px; background: #080808; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; }
        .tab { color: #444; font-size: 0.65rem; text-align: center; font-weight: bold; }
        .tab.active { color: var(--primario); }
        .tab-icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }

        #mapa { width: 100%; height: 200px; border-radius: 16px; margin-bottom: 20px; border: 1px solid #222; }
        .card { background: var(--tarjeta); padding: 15px; border-radius: 14px; margin-bottom: 12px; border-left: 4px solid var(--secundario); }
    </style>
</head>
<body>

    <div id="selector-inicio">
        <div class="logo-ntv">NTV</div>
        <h2 style="color:var(--primario)">EDUAR SHOP</h2>
        <button class="btn btn-pwa" id="btn-instalar" style="display:none;">📲 Instalar App</button>
        <button class="btn btn-web" onclick="iniciarApp()">🌐 Abrir en Navegador</button>
    </div>

    <header class="header">
        <div style="font-weight: 900; color: var(--primario);">EDUAR SHOP</div>
        <div id="status" style="font-size: 0.7rem; color: var(--secundario);">ONLINE</div>
    </header>

    <div id="inicio" class="vista activa">
        <div id="mapa"></div>
        <div class="card" style="border-color: var(--primario);">
            <h4 style="margin:0; color:var(--primario)">RESUMEN DE HOY</h4>
            <div id="resumen-dashboard" style="margin-top:10px; font-size: 0.9rem;">Cargando...</div>
        </div>
    </div>

    <div id="inventario" class="vista">
        <h3 style="color: var(--secundario)">INVENTARIO</h3>
        <input type="text" id="inv-nombre" class="input-box" placeholder="Producto">
        <div style="display:flex; gap:10px;">
            <input type="number" id="inv-precio" class="input-box" placeholder="Precio $">
            <input type="number" id="inv-stock" class="input-box" placeholder="Stock">
        </div>
        <button class="btn btn-action" onclick="guardarProducto()">Agregar</button>
        <div id="lista-productos" style="margin-top:15px;"></div>
    </div>

    <div id="clientes" class="vista">
        <h3 style="color: var(--primario)">CLIENTES</h3>
        <input type="text" id="cli-nombre" class="input-box" placeholder="Nombre">
        <input type="tel" id="cli-wa" class="input-box" placeholder="WhatsApp">
        <div style="background:#0a0a0a; padding:12px; border-radius:12px; margin-bottom:15px; border:1px solid #222;">
            <span id="coords-val" style="font-family:monospace; color:var(--primario)">0.00, 0.00</span><br>
            <button class="btn btn-gps" onclick="capturarGPS()">🎯 Capturar Coordenadas</button>
        </div>
        <button class="btn btn-action" onclick="guardarCliente()">Guardar</button>
    </div>

    <div id="reportes" class="vista">
        <h3 style="color: var(--acento)">HISTORIAL DE VENTAS</h3>
        <div id="lista-ventas"></div>
    </div>

    <nav class="nav-inferior">
        <div class="tab active" onclick="cambiarVista('inicio')"><span class="tab-icon">📍</span>INICIO</div>
        <div class="tab" onclick="accesoSeguro('inventario')"><span class="tab-icon">📦</span>INVENT</div>
        <div class="tab" onclick="cambiarVista('clientes')"><span class="tab-icon">👤</span>CLIENTE</div>
        <div class="tab" onclick="cambiarVista('reportes')"><span class="tab-icon">📊</span>REPORT</div>
    </nav>

    <script>
        let appData = {
            productos: JSON.parse(localStorage.getItem('es_p')) || [],
            clientes: JSON.parse(localStorage.getItem('es_c')) || [],
            ventas: JSON.parse(localStorage.getItem('es_v')) || [],
            gps: ""
        };

        // PWA
        let installEvt;
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); installEvt = e; document.getElementById('btn-instalar').style.display='block'; });
        
        function iniciarApp() {
            document.getElementById('selector-inicio').style.display='none';
            cargarMapa();
            actualizarDashboard();
        }

        // Seguridad
        function accesoSeguro(vista) {
            const clave = prompt("CLAVE DE ACCESO:");
            if(clave === "nano") { cambiarVista(vista); renderProductos(); }
            else { alert("CLAVE INCORRECTA"); }
        }

        function cambiarVista(id) {
            document.querySelectorAll('.vista').forEach(v => v.classList.remove('activa'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('activa');
            if(id === 'reportes') renderReportes();
        }

        // Funciones GPS
        function cargarMapa() {
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    const m = new google.maps.Map(document.getElementById("mapa"), {
                        zoom: 17, center: coords, disableDefaultUI: true,
                        styles: [{"stylers":[{"invert_lightness":true},{"hue":"#ccff00"}]}]
                    });
                    new google.maps.Marker({ position: coords, map: m });
                }, null, {enableHighAccuracy: true});
            }
        }

        function capturarGPS() {
            navigator.geolocation.getCurrentPosition(pos => {
                appData.gps = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
                document.getElementById('coords-val').innerText = appData.gps;
            }, null, {enableHighAccuracy: true});
        }

        // Logica de Datos
        function guardarProducto() {
            const p = { id: Date.now(), nom: document.getElementById('inv-nombre').value, pre: document.getElementById('inv-precio').value, stock: document.getElementById('inv-stock').value };
            appData.productos.push(p);
            localStorage.setItem('es_p', JSON.stringify(appData.productos));
            renderProductos();
        }

        function renderProductos() {
            document.getElementById('lista-productos').innerHTML = appData.productos.map(p => `
                <div class="card"><b>${p.nom}</b> - $${p.pre} <br><small>Stock: ${p.stock}</small></div>
            `).join('');
        }

        function guardarCliente() {
            const c = { id: Date.now(), nom: document.getElementById('cli-nombre').value, wa: document.getElementById('cli-wa').value, gps: appData.gps };
            appData.clientes.push(c);
            localStorage.setItem('es_c', JSON.stringify(appData.clientes));
            alert("Cliente guardado");
        }

        function renderReportes() {
            document.getElementById('lista-ventas').innerHTML = appData.ventas.length ? appData.ventas.map(v => `
                <div class="card" style="border-left-color: var(--acento);">
                    <div style="display:flex; justify-content:space-between"><b>${v.cliente}</b> <small>${v.fecha}</small></div>
                    <div style="color:var(--primario); font-weight:900">$${v.total}</div>
                </div>
            `).reverse().join('') : "<p style='color:#555'>No hay ventas registradas.</p>";
        }

        function actualizarDashboard() {
            document.getElementById('resumen-dashboard').innerHTML = `
                Inventario: ${appData.productos.length} items<br>
                Clientes: ${appData.clientes.length}<br>
                Ventas Totales: ${appData.ventas.length}
            `;
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
