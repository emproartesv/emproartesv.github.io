<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Eduar Shop Pro</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --primary: #ccff00; 
            --accent: #bf00ff;  
            --warning: #ff5f00; 
            --text: #ffffff;
            --border: #222;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; 
            padding: 70px 0 90px 0; overflow-x: hidden;
        }

        /* MODAL DE BIENVENIDA / INSTALACIÓN */
        #modal-instalacion {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center;
        }

        /* HEADER */
        .header {
            position: fixed; top: 0; width: 100%; height: 65px;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 20px;
            border-bottom: 1px solid var(--border); z-index: 1000;
        }
        .logo {
            background: var(--warning); color: #000;
            font-weight: 900; font-size: 0.9rem; padding: 5px 12px;
            border-radius: 5px; text-transform: uppercase;
        }

        /* BOTONES */
        .btn {
            width: 100%; border: none; border-radius: 12px; padding: 18px;
            font-weight: bold; font-size: 1rem; text-transform: uppercase;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-accent { background: var(--accent); color: #fff; margin-bottom: 15px; }
        .btn-outline { background: transparent; border: 1px solid #444; color: #888; }

        /* INPUTS */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 6px; text-transform: uppercase; }
        input, select {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            padding: 16px; color: #fff; border-radius: 12px; font-size: 1rem;
        }

        /* VISTAS */
        .view { display: none; padding: 0 15px; animation: slideUp 0.3s ease; }
        .view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border-radius: 16px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .card-title { font-size: 0.85rem; color: var(--primary); font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

        /* NAVEGACIÓN */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: var(--card); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom); z-index: 1000;
        }
        .nav-item { color: #555; text-align: center; font-size: 0.65rem; font-weight: bold; width: 20%; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.5rem; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="modal-instalacion">
        <div style="background: var(--warning); color: black; padding: 10px 20px; border-radius: 8px; font-weight: 900; margin-bottom: 20px;">EDUAR SHOP</div>
        <h2 style="color: white; margin-bottom: 10px;">¿Cómo deseas continuar?</h2>
        <p style="color: #888; margin-bottom: 30px;">Para una mejor experiencia, instala la aplicación en tu pantalla de inicio.</p>
        <button class="btn btn-accent" id="btn-instalar-pwa" style="display: none;">📲 INSTALAR COMO APP</button>
        <button class="btn btn-outline" onclick="cerrarModalInstalacion()">SEGUIR EN NAVEGADOR</button>
    </div>

    <header class="header">
        <div class="logo">Eduar Shop</div>
        <div style="margin-left: auto; font-size: 0.8rem; font-weight: bold; color: var(--primary);" id="status-title">Dashboard</div>
    </header>

    <div id="inicio" class="view active">
        <div class="card">
            <div class="card-title">Ubicación de Operaciones</div>
            <div id="mapa-gps" style="width:100%; height:250px; border-radius:12px; background:#111;"></div>
            <button class="btn btn-outline" style="margin-top: 10px; padding: 10px;" onclick="actualizarUbicacionActual()">📍 Refrescar GPS</button>
        </div>
        <div class="card" id="resumen-ventas">Cargando...</div>
    </div>

    <div id="inventario" class="view">
        <div class="card">
            <div class="card-title">Añadir Producto</div>
            <div class="input-group"><label>Nombre</label><input type="text" id="p-nom"></div>
            <div style="display:flex; gap:10px;">
                <div class="input-group" style="flex:1"><label>Precio $</label><input type="number" id="p-pre" step="0.01"></div>
                <div class="input-group" style="flex:1"><label>Stock</label><input type="number" id="p-sto"></div>
            </div>
            <button class="btn btn-primary" onclick="guardarProducto()">+ Agregar Item</button>
        </div>
        <div id="lista-p"></div>
    </div>

    <div id="cliente" class="view">
        <div class="card">
            <div class="card-title">Registro de Cliente</div>
            <input type="hidden" id="c-id">
            <div class="input-group"><label>Nombres y Apellidos</label><input type="text" id="c-nom"></div>
            <div class="input-group"><label>WhatsApp</label><input type="tel" id="c-wa"></div>
            <div class="input-group">
                <label>Coordenadas Capturadas</label>
                <input type="text" id="c-geo" readonly style="color: var(--primary); font-family: monospace; font-size: 0.9rem;">
            </div>
            <button class="btn btn-outline" style="margin-bottom: 15px; border-color: var(--accent); color: var(--accent);" onclick="capturarCoordenadasCliente()">🎯 CAPTURAR UBICACIÓN CLIENTE</button>
            <div class="input-group"><label>Dirección Manual</label><input type="text" id="c-dir"></div>
            <button class="btn btn-primary" id="c-btn" onclick="guardarCliente()">Guardar Cliente</button>
        </div>
        <div id="lista-c"></div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="nav('inicio')"><span class="nav-icon">📍</span>Inicio</div>
        <div class="nav-item" onclick="proteccionInventario()"><span class="nav-icon">📦</span>Invent</div>
        <div class="nav-item" onclick="nav('cliente')"><span class="nav-icon">👤</span>Clientes</div>
        <div class="nav-item" onclick="nav('venta')"><span class="nav-icon">🛒</span>Venta</div>
        <div class="nav-item" onclick="nav('reporte')"><span class="nav-icon">📊</span>Report</div>
    </nav>

    <div id="venta" class="view">
        <input type="text" id="busqueda-c" placeholder="🔍 Buscar cliente..." onkeyup="filtrarClientes()" style="margin-bottom:15px;">
        <div id="lista-c-venta"></div>
    </div>
    <div id="pos" class="view">
        <div class="card">
            <div class="card-title" id="pos-cliente">Venta Nueva</div>
            <div id="pos-items"></div>
            <div id="pos-total" style="font-size: 2rem; color: var(--primary); font-weight: 900; text-align: right;">$0.00</div>
            <button class="btn btn-primary" onclick="finalizarVenta()">Finalizar</button>
        </div>
    </div>
    <div id="reporte" class="view"><div id="lista-v"></div></div>

    <script>
        let DB = {
            clientes: JSON.parse(localStorage.getItem('es_c')) || [],
            productos: JSON.parse(localStorage.getItem('es_p')) || [],
            ventas: JSON.parse(localStorage.getItem('es_v')) || []
        };
        
        let promptInstalacion;
        const btnInstalar = document.getElementById('btn-instalar-pwa');

        // GESTIÓN DE INSTALACIÓN
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            promptInstalacion = e;
            btnInstalar.style.display = 'block';
        });

        btnInstalar.addEventListener('click', async () => {
            if (promptInstalacion) {
                promptInstalacion.prompt();
                const { outcome } = await promptInstalacion.userChoice;
                if (outcome === 'accepted') cerrarModalInstalacion();
            }
        });

        function cerrarModalInstalacion() {
            document.getElementById('modal-instalacion').style.display = 'none';
        }

        // SEGURIDAD INVENTARIO
        function proteccionInventario() {
            const clave = prompt("Introduce la clave de acceso:");
            if (clave === "nano") {
                nav('inventario');
            } else {
                alert("Clave incorrecta. Acceso denegado.");
            }
        }

        // GEOLOCALIZACIÓN MEJORADA
        function actualizarUbicacionActual() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    const mapa = new google.maps.Map(document.getElementById("mapa-gps"), { 
                        zoom: 17, center: coords, disableDefaultUI: true,
                        styles: [{"stylers":[{"invert_lightness":true},{"hue":"#ccff00"}]}]
                    });
                    new google.maps.Marker({ position: coords, map: mapa, icon: 'https://maps.google.com/mapfiles/ms/icons/green-dot.png' });
                }, error => alert("Error de GPS: Asegúrate de tener el GPS encendido."), { enableHighAccuracy: true });
            }
        }

        function capturarCoordenadasCliente() {
            document.getElementById('c-geo').value = "Capturando...";
            navigator.geolocation.getCurrentPosition(pos => {
                document.getElementById('c-geo').value = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
            }, () => alert("No se pudo obtener la ubicación"), { enableHighAccuracy: true });
        }

        // NAVEGACIÓN Y LÓGICA (Simplificada para el ejemplo)
        function nav(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'inicio') actualizarUbicacionActual();
            if(id === 'inventario') renderP();
            if(id === 'cliente') renderC();
            if(id === 'venta') renderCVenta();
            if(id === 'reporte') renderV();
        }

        // Funciones de guardado y renderizado iguales a la versión anterior...
        function guardarProducto() {
            const n = document.getElementById('p-nom').value;
            const p = document.getElementById('p-pre').value;
            const s = document.getElementById('p-sto').value;
            if(!n || !p) return;
            DB.productos.push({id:Date.now(), nom:n, pre:parseFloat(p), sto:parseInt(s)});
            localStorage.setItem('es_p', JSON.stringify(DB.productos)); renderP();
        }
        function renderP() {
            document.getElementById('lista-p').innerHTML = DB.productos.map(p => `
                <div class="list-item"><div><b>${p.nom}</b><small>$${p.pre.toFixed(2)}</small></div><button onclick="borrarP(${p.id})">🗑️</button></div>
            `).join('');
        }
        function guardarCliente() {
            const nuevo = {id: Date.now(), nom: document.getElementById('c-nom').value, wa: document.getElementById('c-wa').value, geo: document.getElementById('c-geo').value, dir: document.getElementById('c-dir').value};
            DB.clientes.push(nuevo); localStorage.setItem('es_c', JSON.stringify(DB.clientes)); renderC();
        }
        function renderC() {
            document.getElementById('lista-c').innerHTML = DB.clientes.map(c => `
                <div class="list-item"><div><b>${c.nom}</b><small>${c.geo || 'Sin GPS'}</small></div></div>
            `).join('');
        }

        window.onload = () => { actualizarUbicacionActual(); };
    </script>
</body>
</html>
